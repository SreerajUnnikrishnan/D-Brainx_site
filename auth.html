<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BrainX - Login / Sign Up</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Space+Grotesk:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        .auth-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - 80px);
            /* accounting for navbar */
            padding: 2rem;
        }

        .auth-card {
            width: 100%;
            max-width: 450px;
            padding: 3rem 2rem;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-tabs {
            display: flex;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border-glass);
        }

        .auth-tab {
            flex: 1;
            text-align: center;
            padding: 1rem;
            cursor: pointer;
            color: var(--text-muted);
            font-family: var(--font-mono);
            transition: all 0.3s;
        }

        .auth-tab.active {
            color: var(--neon-blue);
            border-bottom: 2px solid var(--neon-blue);
            text-shadow: 0 0 10px var(--neon-blue-glow);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .form-control {
            width: 100%;
            padding: 0.8rem 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-glass);
            border-radius: 8px;
            color: var(--text-main);
            font-family: var(--font-sans);
            transition: all 0.3s;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--neon-blue);
            box-shadow: 0 0 10px var(--neon-blue-glow);
            background: rgba(255, 255, 255, 0.1);
        }

        .auth-btn {
            width: 100%;
            margin-top: 1rem;
        }

        .auth-switch {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .auth-switch a {
            color: var(--neon-blue);
        }

        .auth-switch a:hover {
            text-decoration: underline;
        }

        #signup-form {
            display: none;
        }

        /* Simple Error Message */
        #auth-error {
            color: #ef4444;
            font-size: 0.875rem;
            text-align: center;
            margin-bottom: 1rem;
            min-height: 20px;
        }
    </style>
</head>

<body>
    <div id="particles-container"></div>
    <div class="cyber-grid"></div>

    <nav class="navbar glass-panel">
        <div class="logo">
            <a href="/"><span class="text-neon">Brain</span>X</a>
        </div>
        <div class="nav-actions">
            <!-- Return home link -->
            <a href="/" class="btn btn-outline" style="font-size: 0.8rem; padding: 0.4rem 1rem;">Back</a>
        </div>
    </nav>

    <main>
        <div class="auth-container">
            <div class="auth-card glass-panel">
                <div class="auth-header">
                    <h2>Welcome to BrainX</h2>
                    <p class="text-muted">Secure access to your intelligence dashboard</p>
                </div>

                <div class="auth-tabs">
                    <div class="auth-tab active" id="tab-login">Login</div>
                    <div class="auth-tab" id="tab-signup">Sign Up</div>
                </div>

                <div id="auth-error"></div>

                <!-- Login Form -->
                <form id="login-form">
                    <div class="form-group">
                        <label for="login-email">Email Address</label>
                        <input type="email" id="login-email" class="form-control" required
                            placeholder="agent@brainx.com" />
                    </div>
                    <div class="form-group">
                        <label for="login-password">Password</label>
                        <input type="password" id="login-password" class="form-control" required
                            placeholder="••••••••" />
                    </div>
                    <button type="submit" class="btn btn-neon auth-btn">Initialize Connection</button>
                    <div class="auth-switch">
                        Don't have an clearance? <a href="#" id="switch-to-signup">Request access</a>
                    </div>
                </form>

                <!-- Signup Form -->
                <form id="signup-form">
                    <div class="form-group">
                        <label for="signup-name">Full Name / Alias</label>
                        <input type="text" id="signup-name" class="form-control" required placeholder="John Doe" />
                    </div>
                    <div class="form-group">
                        <label for="signup-email">Email Address</label>
                        <input type="email" id="signup-email" class="form-control" required
                            placeholder="agent@brainx.com" />
                    </div>
                    <div class="form-group">
                        <label for="signup-password">Password</label>
                        <input type="password" id="signup-password" class="form-control" required
                            placeholder="••••••••" />
                    </div>
                    <div class="form-group">
                        <label for="signup-role">Role</label>
                        <select id="signup-role" class="form-control">
                            <option value="user">User (Protect my system)</option>
                            <option value="hacker">Ethical Hacker (Join the force)</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-neon auth-btn">Create Clearance</button>
                    <div class="auth-switch">
                        Already have clearance? <a href="#" id="switch-to-login">Access terminal</a>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script type="module" src="/src/main.js"></script>
    <script type="module" src="/src/particles.js"></script>
    <script type="module" src="/src/auth.js"></script>
</body>

</html>
